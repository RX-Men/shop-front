name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base-href /shop-front/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/shop-front/browser'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
