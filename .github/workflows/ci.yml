name: CI

on:
  pull_request:

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript
        run: npm run tsc

      - name: Run ESLint
        run: npm run lint

      - name: Run Stylelint
        run: npm run stylelint:check

      - name: Run Prettier
        run: npm run prettier:check
