<h1 class="sign-up__title">{{ content.title }}</h1>

<form class="sign-up__form" id="sign-up-form" [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
  <fieldset class="sign-up__section">
    <legend class="sign-up__section-title">{{ content.sections.account.title }}</legend>
    <div class="sign-up__fields">
      <app-input
        type="email"
        [label]="content.sections.account.fields.email.label"
        [placeholder]="content.sections.account.fields.email.placeholder"
        [required]="true"
        [value]="signUpForm.controls.email.value ?? ''"
        [error]="
          signUpForm.controls.email.invalid &&
          (signUpForm.controls.email.touched || signUpForm.controls.email.dirty)
        "
        [errorText]="getEmailErrorText()"
        (valueChange)="
          signUpForm.controls.email.setValue($event); signUpForm.controls.email.markAsDirty()
        "
        (blurred)="signUpForm.controls.email.markAsTouched()"
      />
      <app-input
        type="password"
        [label]="content.sections.account.fields.password.label"
        [required]="true"
        [value]="signUpForm.controls.password.value ?? ''"
        [error]="
          signUpForm.controls.password.invalid &&
          (signUpForm.controls.password.touched || signUpForm.controls.password.dirty)
        "
        [errorText]="getPasswordErrorText()"
        (valueChange)="
          signUpForm.controls.password.setValue($event); signUpForm.controls.password.markAsDirty()
        "
        (blurred)="signUpForm.controls.password.markAsTouched()"
      />
      <app-input
        type="password"
        [label]="content.sections.account.fields.confirmPassword.label"
        [required]="true"
        [value]="signUpForm.controls.confirmPassword.value ?? ''"
        [error]="
          (signUpForm.controls.confirmPassword.invalid ||
            signUpForm.hasError('passwordMismatch')) &&
          (signUpForm.controls.confirmPassword.touched || signUpForm.controls.confirmPassword.dirty)
        "
        [errorText]="getConfirmPasswordErrorText()"
        (valueChange)="
          signUpForm.controls.confirmPassword.setValue($event);
          signUpForm.controls.confirmPassword.markAsDirty()
        "
        (blurred)="signUpForm.controls.confirmPassword.markAsTouched()"
      />
    </div>
  </fieldset>

  <fieldset class="sign-up__section">
    <legend class="sign-up__section-title">{{ content.sections.personalInfo.title }}</legend>
    <div class="sign-up__fields">
      <div class="sign-up__row">
        <app-input
          [label]="content.sections.personalInfo.fields.firstName.label"
          [placeholder]="content.sections.personalInfo.fields.firstName.placeholder"
          [required]="true"
          [value]="signUpForm.controls.firstName.value ?? ''"
          [error]="
            signUpForm.controls.firstName.invalid &&
            (signUpForm.controls.firstName.touched || signUpForm.controls.firstName.dirty)
          "
          [errorText]="getFirstNameErrorText()"
          (valueChange)="
            signUpForm.controls.firstName.setValue($event);
            signUpForm.controls.firstName.markAsDirty()
          "
          (blurred)="signUpForm.controls.firstName.markAsTouched()"
        />
        <app-input
          [label]="content.sections.personalInfo.fields.lastName.label"
          [placeholder]="content.sections.personalInfo.fields.lastName.placeholder"
          [required]="true"
          [value]="signUpForm.controls.lastName.value ?? ''"
          [error]="
            signUpForm.controls.lastName.invalid &&
            (signUpForm.controls.lastName.touched || signUpForm.controls.lastName.dirty)
          "
          [errorText]="getLastNameErrorText()"
          (valueChange)="
            signUpForm.controls.lastName.setValue($event);
            signUpForm.controls.lastName.markAsDirty()
          "
          (blurred)="signUpForm.controls.lastName.markAsTouched()"
        />
      </div>
      <div class="sign-up__date-field"></div>
    </div>
  </fieldset>

  <fieldset class="sign-up__section">
    <div class="sign-up__fields"></div>
  </fieldset>

  <div class="sign-up__actions">
    <app-button type="submit" [size]="'l'">{{ content.actions.submit }}</app-button>
  </div>

  @if (submitted()) {
    <div class="sign-up__success" role="status">{{ content.messages.success }}</div>
  }
</form>
