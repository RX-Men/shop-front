<label class="checkbox checkbox_size_{{ size() }}" [class.checkbox_disabled]="disabled()"
  ><input
    class="checkbox__input"
    type="checkbox"
    [checked]="checked()"
    [disabled]="disabled()"
    [required]="required()"
    (change)="onInputChange($event)"
  />

  <ng-content />
  @if (required()) {
    <span class="checkbox__required" aria-hidden="true">*</span>
  }
</label>
