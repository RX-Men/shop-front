@let computedLabel = label();

<button
  class="icon-button"
  appTooltip
  [type]="type()"
  [tooltipText]="computedLabel"
  [tooltipColor]="tooltipColor()"
  [ariaLabel]="computedLabel"
  [ariaPressed]="ariaPressed()"
  [attr.data-testid]="_testIds.root"
  [disabled]="disabled()"
>
  <app-icon [name]="icon()" [size]="size()" />
</button>
