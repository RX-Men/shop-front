<ng-template #logo>
  <span class="logo">
    <img
      class="logo__img"
      alt="Logo"
      fill
      [priority]="imgPriority()"
      [ngSrc]="'@/assets/icons/logo.svg'"
      [attr.data-testid]="_testIds.root"
    />
  </span>
</ng-template>

@if (linkable()) {
  <a class="logo__link" aria-label="Go to Home page" [routerLink]="'/'">
    <ng-container [ngTemplateOutlet]="logo" />
  </a>
} @else {
  <ng-container [ngTemplateOutlet]="logo" />
}
