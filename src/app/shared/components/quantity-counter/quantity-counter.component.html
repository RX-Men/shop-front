<div class="quantity-counter">
  <app-icon-button
    [icon]="'remove'"
    [label]="'Decrease quantity'"
    [disabled]="disabled() || value() <= 1"
    (click)="decrease()"
  />

  <span class="text-xl">{{ value() }}</span>

  <app-icon-button
    [icon]="'add'"
    [label]="'Increase quantity'"
    [disabled]="disabled() || value() >= max()"
    (click)="increase()"
  />
</div>
